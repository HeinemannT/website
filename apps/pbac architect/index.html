<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corporater PBAC Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script type="module" src="index.js"></script>
    <style>
        body { font-family: 'IBM Plex Sans', sans-serif; background-color: #f4f4f4; color: #161616; }
        
        /* IBM Carbon-like Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f4f4f4; }
        ::-webkit-scrollbar-thumb { background: #8d8d8d; }
        ::-webkit-scrollbar-thumb:hover { background: #6f6f6f; }

        /* Utilities */
        .carbon-input {
            background-color: #f4f4f4;
            border-bottom: 1px solid #8d8d8d;
            transition: all 0.1s;
        }
        .carbon-input:focus {
            outline: 2px solid #0f62fe;
            outline-offset: -2px;
        }
        .carbon-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            font-weight: 400;
            padding: 0 1rem; /* 16px */
            height: 2rem; /* 32px - standardized to Small size for density */
            cursor: pointer;
            transition: background 70ms cubic-bezier(0,0,.38,.9);
        }
        .carbon-btn-primary {
            background-color: #0f62fe;
            color: #fff;
        }
        .carbon-btn-primary:hover { background-color: #0353e9; }
        .carbon-btn-ghost {
            background-color: transparent;
            color: #0f62fe;
        }
        .carbon-btn-ghost:hover { background-color: #e5f1ff; color: #0043ce; }
        
        .carbon-icon-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2rem;
            height: 2rem;
            color: #161616;
            background-color: transparent;
            cursor: pointer;
            transition: background 70ms;
        }
        .carbon-icon-btn:hover {
            background-color: #e0e0e0;
        }
        .carbon-icon-btn-danger:hover {
            background-color: #da1e28;
            color: white;
        }

    </style>
<script type="importmap">

</body>
</html>
